name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[web,dev]'

      - name: Black
        run: black --check ttsfm ttsfm-web tests

      - name: Flake8
        run: flake8 ttsfm ttsfm-web

      - name: Mypy
        run: mypy ttsfm

      - name: Pytest
        run: pytest
